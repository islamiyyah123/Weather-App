<select id="city-select">
  <option value=""></option>
  <option value="new york">New York</option>
  <option value="los angeles">Los Angeles</option>
  <option value="chicago">Chicago</option>
  <option value="paris">Paris</option>
  <option value="tokyo">Tokyo</option>
  <option value="london">London</option>
</select>

<button id="get-weather-btn">Get Weather</button>

<div id="weather-container">
  <img id="weather-icon" />

  <p id="main-temperature"></p>
  <p id="feels-like"></p>
  <p id="humidity"></p>
  <p id="wind"></p>
  <p id="wind-gust"></p>
  <p id="weather-main"></p>
  <p id="location"></p>
</div>

<script>
const citySelect = document.getElementById("city-select");
const getWeatherBtn = document.getElementById("get-weather-btn");

async function getWeather(city) {
  try {
    const response = await fetch(
      `https://weather-proxy.freecodecamp.rocks/api/city/${city}`
    );

    const data = await response.json();
    return data;
  } catch (error) {
    console.error(error);
    return null;
  }
}

async function showWeather(city) {
  const data = await getWeather(city);

  if (!data) {
    alert("Something went wrong, please try again later");
    return;
  }

  document.getElementById("weather-icon").src =
    data.weather?.[0]?.icon || "N/A";

  document.getElementById("main-temperature").textContent =
    data.main?.temp ?? "N/A";

  document.getElementById("feels-like").textContent =
    data.main?.feels_like ?? "N/A";

  document.getElementById("humidity").textContent =
    data.main?.humidity ?? "N/A";

  document.getElementById("wind").textContent =
    data.wind?.speed ?? "N/A";

  document.getElementById("wind-gust").textContent =
    data.wind?.gust ?? "N/A";

  document.getElementById("weather-main").textContent =
    data.weather?.[0]?.main ?? "N/A";

  document.getElementById("location").textContent =
    data.name ?? "N/A";
}

getWeatherBtn.addEventListener("click", () => {
  const city = citySelect.value;

  if (!city) {
    return;
  }

  showWeather(city);
});
</script>
